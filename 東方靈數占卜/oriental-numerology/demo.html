<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>東方靈數占卜</title>
<link rel="stylesheet" href="src/app.css">
</head>
<body>

<audio id="bgm" loop preload="auto"></audio>

<div id="stage">
  <button id="mute" aria-label="背景音樂開關" title="背景音樂">
    <svg viewBox="0 0 24 24" width="17" height="17" fill="none"
         stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor" stroke="none"/>
      <path class="wave" d="M16.5 8.5a5 5 0 0 1 0 7"/>
      <path class="wave" d="M19 6a8.5 8.5 0 0 1 0 12"/>
      <path class="slash" d="M4 4l16 16"/>
    </svg>
  </button>
  <video class="vid" id="v1" playsinline muted preload="auto"></video>
  <video class="vid" id="v2" playsinline loop preload="auto"></video>
  <video class="vid" id="v3" playsinline preload="auto"></video>
  <video class="vid" id="v4" playsinline preload="auto"></video>

  <div id="missing"><div class="inner" id="missingBody"></div></div>

  <!-- 透明熱區：位置由 HOTSPOTS 決定 -->
  <button class="hot" id="hotBall" data-label="水晶球" aria-label="輕觸水晶球"></button>
  <button class="hot" id="hotSun" data-label="日／月" aria-label="回到屋內"></button>

  <div class="panel" id="pIntro">
    <div class="titlebox">
      <h1>東方靈數占卜</h1>
      <p>生 命 靈 數　·　五 行　·　流 年</p>
    </div>
    <div class="hint" id="introHint">輕 觸 水 晶 球</div>
  </div>

  <div class="panel" id="pCollect">
    <div class="ask" id="askBox">
      <h2>請 輸 入 出 生<br>西 元 年 / 月 / 日</h2>
      <input id="bd" type="text" inputmode="numeric" maxlength="14"
             placeholder="1990 / 01 / 01" autocomplete="off">
      <div class="err" id="err"></div>
    </div>
    <div class="hint" id="collectHint" style="opacity:.45">填 妥 後 輕 觸 水 晶 球</div>
  </div>

  <div class="panel" id="pCalc"><div id="prog"></div></div>

  <div class="panel" id="pReveal"><div id="num"></div></div>

  <div id="book">
    <div class="leaf">
      <div class="pgnum" id="pgnum"></div>
      <div id="pages"></div>
    </div>
    <div class="nav">
      <button class="turn" id="prev" aria-label="上一頁">‹</button>
      <div class="dots" id="dots"></div>
      <button class="turn" id="next" aria-label="下一頁">›</button>
    </div>
  </div>
  <div id="sales"></div>
</div>

<script src="src/engine.js"></script>
<script src="src/content.js"></script>
<script src="src/magnetic.js"></script>
<script src="src/magnetic-content.js"></script>
<script>
/* ═══════════════════════════════════════
   免費版：報告在關鍵處收束，導向銷售頁
   ═══════════════════════════════════════ */
window.UNLOCKED = false;
</script>
<script src="src/app.js"></script>
</body>
</html>
